<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Job Portal</title>
    <meta name="description" content="Create a new Job Portal account to browse and apply for jobs.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-card">
        <h2>Job Portal — Register</h2>

        <div id="alert" class="alert" style="display:none;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password <span style="color:#888;font-weight:normal;">(min 8 characters)</span></label>
                <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;">Create Account</button>
        </form>

        <p class="auth-link">Already have an account? <a href="login.html">Sign In</a></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
