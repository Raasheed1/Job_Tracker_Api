<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Applications - Admin - Job Portal</title>
    <meta name="description" content="Admin application management: view all applications and update statuses.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <span class="brand">Job Portal (Admin)</span>
            <ul>
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="admin-jobs.html">Jobs</a></li>
                <li><a href="admin-applications.html" class="active">Applications</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Application Management</h1>
            <p>View all applications and update their status.</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>
        <div id="successAlert" class="alert alert-success" style="display:none;"></div>

        <div class="toolbar">
            <select id="filterStatus">
                <option value="">All statuses</option>
                <option value="pending">Pending</option>
                <option value="selected">Selected</option>
                <option value="rejected">Rejected</option>
            </select>
            <button class="btn" id="filterBtn">Filter</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Applicant Email</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Status</th>
                        <th>Applied On</th>
                        <th>Change Status</th>
                    </tr>
                </thead>
                <tbody id="appsBody">
                    <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-applications.js"></script>
</body>
</html>
