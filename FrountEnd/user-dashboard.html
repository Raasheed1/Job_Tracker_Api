<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Job Portal</title>
    <meta name="description" content="Your job application statistics.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <span class="brand">Job Portal</span>
            <ul>
                <li><a href="user-dashboard.html" class="active">Dashboard</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="my-applications.html">My Applications</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Dashboard</h1>
            <p id="welcomeMsg">Welcome back!</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="label">Total Applications</div>
                <div class="value" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Selected</div>
                <div class="value" id="statSelected">-</div>
            </div>
            <div class="stat-card">
                <div class="label">Rejected</div>
                <div class="value" id="statRejected">-</div>
            </div>
        </div>

        <p>
            <a href="jobs.html" class="btn">Browse Jobs</a>
            &nbsp;
            <a href="my-applications.html" class="btn">My Applications</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/user-dashboard.js"></script>
</body>
</html>
