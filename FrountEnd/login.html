<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Portal</title>
    <meta name="description" content="Sign in to your Job Portal account.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-card">
        <h2>Job Portal — Sign In</h2>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn" style="width:100%;">Sign In</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="register.html">Register</a></p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
