<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications - Job Portal</title>
    <meta name="description" content="View and manage your job applications.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="container nav-inner">
            <span class="brand">Job Portal</span>
            <ul>
                <li><a href="user-dashboard.html">Dashboard</a></li>
                <li><a href="jobs.html">Jobs</a></li>
                <li><a href="my-applications.html" class="active">My Applications</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Applications</h1>
            <p>Track the status of all your submitted applications.</p>
        </div>

        <div id="alert" class="alert alert-error" style="display:none;"></div>
        <div id="successAlert" class="alert alert-success" style="display:none;"></div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Job Title</th>
                        <th>Company</th>
                        <th>Status</th>
                        <th>Applied On</th>
                        <th>Last Updated</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="appsBody">
                    <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/my-applications.js"></script>
</body>
</html>
